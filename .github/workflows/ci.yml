# ==============================================
# CI Pipeline — stranger_things
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
# 
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images (pastikan Dockerfile valid)

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
# ----------------------

jobs:
  # ================================
  # BACKEND
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: sqlite:///./test.db
      PYTHONPATH: .

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Reset DB
        run: rm -f test.db

      - name: Run tests
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=50


  # ================================
  # FRONTEND
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"   
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Build
        run: npm run build


  # ================================
  # DOCKER
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: docker build -t cloudapp-backend:ci ./backend

      - name: Build frontend
        run: docker build -t cloudapp-frontend:ci ./frontend
# ================================
  # JOB 4: Notify on Failure
  # ================================
  notify-failure:
    name: 📢 Notify Failure
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker] # Menunggu semua job selesai
    if: failure() && github.event_name == 'pull_request' # Jalan HANYA jika ada yang gagal & ini di PR
    timeout-minutes: 10

    permissions:
      pull-requests: write # Izin untuk menulis komentar di PR

    steps:
      - name: 📝 Post Comment to PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ## ❌ CI Pipeline Failed!
            Halo @${{ github.actor }}, sepertinya ada yang salah dengan perubahanmu.
            Silakan cek log detail di tab [Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
            Segera diperbaiki ya! 🚀
