# ==============================================
# CI Pipeline — Cloud Team XX (FIXED VERSION)
# ==============================================
# - Aman tanpa .env
# - Backend pakai env dari GitHub Actions
# - Frontend tidak crash jika test belum tersedia
# - Docker build tetap berjalan

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ================================
  # JOB 1: Backend Test (FastAPI)
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔥 FIX: ENV untuk menggantikan .env
      - name: 🧪 Run backend tests
        env:
          DATABASE_URL: sqlite:///./test.db
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=50


  # ================================
  # JOB 2: Frontend Test (React/Vite)
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      # 🔥 FIX: tidak crash kalau test belum ada
      - name: 🧪 Run frontend tests (safe mode)
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "⚠️ No test script found, skipping tests"
          fi

      - name: 🏗️ Build frontend
        run: npm run build


  # ================================
  # JOB 3: Docker Build
  # ================================
  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build backend image
        run: docker build -t cloudapp-backend:ci ./backend

      - name: 🐳 Build frontend image
        run: docker build -t cloudapp-frontend:ci ./frontend

      - name: ✅ Success message
        run: |
          echo "✅ CI SUCCESS: All builds completed"
          docker images | grep cloudapp || true
