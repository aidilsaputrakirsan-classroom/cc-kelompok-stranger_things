name: CD — Deploy ke DeployCC

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      mode:
        description: 'Deploy mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full

# ─────────────────────────────────────────────
# REQUIRED SECRETS:
#
# DEPLOY_URL
# contoh:
# https://deploycc.akhzafachrozy.my.id
#
# DEPLOY_KEY
# API key deploycc
#
# DEPLOY_REPO
# nama repo / slug
# ─────────────────────────────────────────────

jobs:
  deploy:
    # hanya jalan kalau CI sukses
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    name: Deploy ke DeployCC
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node ──────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install dependency ──────────────
      - name: Install dependencies frontend
        working-directory: frontend
        run: npm ci

      # ── 4. Build frontend ──────────────────
      - name: Build React production
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      # ── 5. Create ZIP ──────────────────────
      - name: Buat ZIP deploy
        run: |
          zip -r deploy.zip . \
            --exclude "frontend/node_modules/*" \
            --exclude "frontend/.next/*" \
            --exclude "frontend/dist/*" \
            --exclude "frontend/build/*" \
            --exclude "backend/venv/*" \
            --exclude "backend/__pycache__/*" \
            --exclude "backend/*.pyc" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.zip"

          echo "────────────────────────────"
          echo "Ukuran ZIP:"
          du -sh deploy.zip
          echo "────────────────────────────"

      # ── 6. Debug secrets ───────────────────
      - name: Debug deploy config
        run: |
          echo "Checking deploy secrets..."

          if [ -z "${{ secrets.DEPLOY_URL }}" ]; then
            echo "❌ DEPLOY_URL kosong"
            exit 1
          fi

          if [ -z "${{ secrets.DEPLOY_KEY }}" ]; then
            echo "❌ DEPLOY_KEY kosong"
            exit 1
          fi

          if [ -z "${{ secrets.DEPLOY_REPO }}" ]; then
            echo "❌ DEPLOY_REPO kosong"
            exit 1
          fi

          echo "✅ Semua secrets tersedia"

          echo "Deploy URL:"
          echo "${{ secrets.DEPLOY_URL }}"

      # ── 7. Deploy ──────────────────────────
      - name: Deploy ke server
        run: |
          RESPONSE=$(curl -v -sS --max-time 300 \
            -X POST "${{ secrets.DEPLOY_URL }}" \
            -F "key=${{ secrets.DEPLOY_KEY }}" \
            -F "repo=${{ secrets.DEPLOY_REPO }}" \
            -F "mode=full" \
            -F "file=@deploy.zip" \
            -A "GitHub-Actions/deploycc" \
            -w "\n---HTTP_CODE:%{http_code}")

          HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')

          echo "──────────────────────────────────"
          echo "HTTP Status: $HTTP_CODE"
          echo "──────────────────────────────────"
          echo "$BODY"
          echo "──────────────────────────────────"

          if echo "$BODY" | grep -q "DEPLOYCC_ERROR"; then
            echo "❌ Deploy GAGAL — server error"
            exit 1
          fi

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deploy GAGAL — HTTP $HTTP_CODE"
            exit 1
          fi

          if echo "$BODY" | grep -q "DEPLOYCC_END"; then
            echo "✅ Deploy BERHASIL"
          else
            echo "⚠️ Response tidak lengkap"
            exit 1
          fi

      # ── 8. Summary sukses ──────────────────
      - name: Ringkasan deploy sukses
        if: success()
        run: |
          echo "## ✅ Deploy Berhasil" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | \`${{ secrets.DEPLOY_REPO }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | CD Deploy |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Waktu | $(date +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

      # ── 9. Summary gagal ───────────────────
      - name: Ringkasan deploy gagal
        if: failure()
        run: |
          echo "## ❌ Deploy Gagal" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Kemungkinan penyebab:" >> $GITHUB_STEP_SUMMARY
          echo "- DEPLOY_URL salah format" >> $GITHUB_STEP_SUMMARY
          echo "- DEPLOY_KEY salah" >> $GITHUB_STEP_SUMMARY
          echo "- Endpoint deploy tidak menerima POST" >> $GITHUB_STEP_SUMMARY
          echo "- deploy.zip tidak ditemukan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pastikan DEPLOY_URL benar:" >> $GITHUB_STEP_SUMMARY
          echo "\`https://domain.com\`" >> $GITHUB_STEP_SUMMARY
