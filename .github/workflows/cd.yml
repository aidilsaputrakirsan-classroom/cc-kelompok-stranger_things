name: CD — Deploy ke DeployCC

on:
  workflow_run:
    workflows:
      - "CI Pipeline"
    types:
      - completed

  workflow_dispatch:

jobs:
  deploy:
    # Jalan hanya jika CI sukses
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1. Checkout source
      - name: Checkout kode
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 3. Install frontend deps
      - name: Install dependencies frontend
        working-directory: frontend
        run: npm ci

      # 4. Build frontend
      - name: Build React
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

      # 5. Buat ZIP deploy
      - name: Buat deploy.zip
        run: |
          zip -r deploy.zip . \
            -x "frontend/node_modules/*" \
            -x "frontend/.next/*" \
            -x "frontend/dist/*" \
            -x "frontend/build/*" \
            -x "backend/venv/*" \
            -x "backend/__pycache__/*" \
            -x "backend/*.pyc" \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.zip"

          echo "ZIP berhasil dibuat"
          ls -lh deploy.zip

      # 6. Deploy ke DeployCC
      - name: Deploy ke server
        run: |
          echo "Mulai deploy..."

          RESPONSE=$(curl -sS --max-time 300 \
            -X POST "https://deploycc.akhzafachrozy.my.id" \
            -F "key=RAHASIA123" \
            -F "repo=fsti-itk-clone" \
            -F "mode=full" \
            -F "file=@deploy.zip" \
            -A "GitHub-Actions/deploycc" \
            -w "\nHTTP_CODE:%{http_code}")

          echo "$RESPONSE"

          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deploy gagal"
            exit 1
          fi

          echo "✅ Deploy sukses"

      # 7. Summary success
      - name: Ringkasan berhasil
        if: success()
        run: |
          echo "## ✅ Deploy berhasil" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Repo: fsti-itk-clone" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      # 8. Summary failed
      - name: Ringkasan gagal
        if: failure()
        run: |
          echo "## ❌ Deploy gagal" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cek log step deploy." >> $GITHUB_STEP_SUMMARY
