# ═══════════════════════════════════════════════════════════════════
#   DeployCC v1.1 — Continuous Deployment
#   Stack: React (frontend/) + Python Uvicorn (backend/) + PostgreSQL
#
#   Cara kerja:
#   1. Deteksi path mana yang berubah (frontend/ vs backend/ vs requirements)
#   2. Kalau cuma frontend yang berubah  → skip_be_install=1 (backend tidak di-restart)
#   3. Kalau cuma backend yang berubah   → skip_fe_build=1   (React tidak di-build ulang)
#   4. Kalau requirements.txt tidak berubah → skip_be_install=1 (pip install dilewati)
#   5. Kalau cuma docs/README berubah    → skip semua (super ringan)
#   6. Zip hanya file yang perlu (exclude node_modules, venv, .git, dll)
#   7. POST ke endpoint DeployCC dengan flag yang sesuai
# ═══════════════════════════════════════════════════════════════════

name: CD — Deploy ke DeployCC

on:
  workflow_run:
    workflows:
      - "CI Pipeline"
    types:
      - completed
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: "Paksa build ulang frontend & backend (abaikan deteksi perubahan)"
        type: boolean
        default: false

# Hindari deploy paralel untuk repo yang sama
concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

# Cuma jalan kalau CI sukses (atau manual dispatch).
# Tanpa filter ini, CD juga jalan saat CI failure.
permissions:
  contents: read
  actions: read

env:
  DEPLOY_ENDPOINT: https://deploycc.akhzafachrozy.my.id
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  #  STEP 1 — Deteksi file mana yang berubah
  # ─────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    # Gate: kalau di-trigger dari workflow_run, CI harus sukses dulu.
    # Manual dispatch selalu lolos.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      backend_changed: ${{ steps.filter.outputs.backend }}
      requirements_changed: ${{ steps.filter.outputs.requirements }}
      package_changed: ${{ steps.filter.outputs.package }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}

    steps:
      # Resolve SHA yang benar:
      # - workflow_run: pakai SHA commit yang men-trigger CI (BUKAN github.sha,
      #   karena di workflow_run github.sha = default branch HEAD, bisa beda)
      # - workflow_dispatch: pakai github.sha (HEAD branch yang dipilih user)
      - name: Resolve commit SHA
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            sha="${{ github.event.workflow_run.head_sha }}"
            branch="${{ github.event.workflow_run.head_branch }}"
            echo "Trigger: workflow_run dari CI (conclusion=${{ github.event.workflow_run.conclusion }})"
          else
            sha="${{ github.sha }}"
            branch="${{ github.ref_name }}"
            echo "Trigger: workflow_dispatch (manual)"
          fi
          echo "  SHA    : $sha"
          echo "  Branch : $branch"
          echo "head_sha=$sha" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Checkout (commit yang lulus CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.head_sha }}
          # fetch-depth: 0 = full history. Wajib untuk workflow_run karena
          # paths-filter butuh git merge-base, dan shallow clone sering gagal
          # dengan exit code 128 (parent commit tidak ada di local history).
          fetch-depth: 0

      # Hitung base SHA dengan aman: kalau parent ada → pakai HEAD~1,
      # kalau tidak ada (initial commit) → set base=ref biar paths-filter
      # otomatis treat SEMUA file sebagai changed (deploy penuh).
      - name: Resolve diff base
        id: base
        run: |
          head="${{ steps.ctx.outputs.head_sha }}"
          if git rev-parse "${head}~1" >/dev/null 2>&1; then
            base=$(git rev-parse "${head}~1")
            echo "✓ Parent commit ditemukan: $base"
          else
            base="$head"
            echo "⚠ Initial commit (tidak ada parent) → semua file dianggap berubah"
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          ref: ${{ steps.ctx.outputs.head_sha }}
          base: ${{ steps.base.outputs.base }}
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            requirements:
              - 'backend/requirements.txt'
              - 'backend/pyproject.toml'
              - 'backend/setup.py'
              - 'backend/Pipfile'
              - 'backend/Pipfile.lock'
            package:
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
              - 'frontend/pnpm-lock.yaml'
              - 'frontend/yarn.lock'

  # ─────────────────────────────────────────────────────────────────
  #  STEP 2 — Bangun ZIP & deploy (SELALU jalan)
  #
  #  Kenapa selalu jalan?
  #  - CD tidak tahu apakah ini deploy pertama di server atau bukan.
  #    Yang tahu adalah script PHP DeployCC (`$isFirstDeploy`).
  #  - Kalau commit cuma update README, ZIP tetap dikirim dengan
  #    skip_fe_build=1 & skip_be_install=1 → server cuma rsync ~2-5 detik
  #    (super ringan, tidak ada build, tidak ada restart service).
  #  - Kalau ini deploy pertama, server abaikan flag skip dan build penuh.
  #  - Kalau commit ada perubahan app, flag dihitung dari diff seperti biasa.
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
      # ── Checkout commit yang sama dengan yang lulus CI ────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-changes.outputs.head_sha }}

      # ── Validasi struktur folder ──────────────────────────────────
      - name: Validate repo structure
        run: |
          set -e
          echo "::group::Struktur repo"
          ls -la
          echo "::endgroup::"

          missing=()
          [ -d "frontend" ] || missing+=("frontend/")
          [ -d "backend" ]  || missing+=("backend/")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Folder wajib tidak ada: ${missing[*]}"
            echo "Repo harus punya struktur:"
            echo "  ./frontend/   (React app, ada package.json)"
            echo "  ./backend/    (Python app, ada main.py/app.py)"
            exit 1
          fi

          if [ ! -f "frontend/package.json" ]; then
            echo "::error::frontend/package.json tidak ditemukan"
            exit 1
          fi

          # Backend harus ada salah satu entry point
          if ! ls backend/{main,app,server,asgi,api}.py >/dev/null 2>&1; then
            echo "::warning::Tidak ditemukan entry point standar di backend/"
            echo "DeployCC akan default ke main:app — pastikan main.py ada"
          fi

          echo "✓ Struktur repo valid"

      # ── Hitung flag skip berdasarkan diff ─────────────────────────
      - name: Compute deploy flags
        id: flags
        run: |
          set -e

          # Default: ikuti deteksi paths-filter
          fe_changed="${{ needs.detect-changes.outputs.frontend_changed }}"
          be_changed="${{ needs.detect-changes.outputs.backend_changed }}"
          req_changed="${{ needs.detect-changes.outputs.requirements_changed }}"
          pkg_changed="${{ needs.detect-changes.outputs.package_changed }}"

          # Manual trigger dengan force → rebuild semuanya
          if [ "${{ github.event.inputs.force_full_rebuild }}" = "true" ]; then
            echo "↻ force_full_rebuild=true → rebuild semua"
            fe_changed="true"
            be_changed="true"
            req_changed="true"
          fi

          # ── Aturan skip_fe_build ──
          # Skip kalau frontend/ tidak berubah sama sekali
          if [ "$fe_changed" = "true" ]; then
            skip_fe_build="0"
            fe_status="🔨 BUILD (frontend berubah)"
          else
            skip_fe_build="1"
            fe_status="⏭  SKIP (frontend tidak berubah)"
          fi

          # ── Aturan skip_be_install ──
          # Skip pip install kalau requirements.txt tidak berubah
          # (kode Python tetap dideploy, cuma pip install yang dilewati)
          if [ "$req_changed" = "true" ]; then
            skip_be_install="0"
            be_status="📦 INSTALL (requirements.txt berubah)"
          else
            skip_be_install="1"
            be_status="⏭  SKIP pip install (requirements tidak berubah)"
          fi

          # ── Restart info (hanya info, dihitung script PHP) ──
          if [ "$be_changed" = "true" ]; then
            restart_status="🔄 RESTART Uvicorn (backend code berubah)"
          else
            restart_status="✋ NO restart (backend tidak berubah, zero downtime)"
          fi

          echo "skip_fe_build=$skip_fe_build" >> "$GITHUB_OUTPUT"
          echo "skip_be_install=$skip_be_install" >> "$GITHUB_OUTPUT"
          echo "fe_changed=$fe_changed" >> "$GITHUB_OUTPUT"
          echo "be_changed=$be_changed" >> "$GITHUB_OUTPUT"

          # Summary
          {
            echo "## 📋 Deploy Plan"
            echo ""
            if [ "$fe_changed" != "true" ] && [ "$be_changed" != "true" ]; then
              echo "> ℹ️ Tidak ada perubahan di \`frontend/\` atau \`backend/\` (mis. cuma update docs)."
              echo "> Deploy tetap dijalankan untuk handle case \"first deploy\" — kalau infra sudah ada,"
              echo "> server cuma rsync file (~3 detik, no build, no restart)."
              echo ""
            fi
            echo "| Komponen | Status |"
            echo "|----------|--------|"
            echo "| Frontend | $fe_status |"
            echo "| Python deps | $be_status |"
            echo "| Backend service | $restart_status |"
            echo ""
            echo "**Flags ke DeployCC:**"
            echo "- \`skip_fe_build=$skip_fe_build\`"
            echo "- \`skip_be_install=$skip_be_install\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Normalisasi nama repo (huruf kecil, hapus karakter aneh) ──
      - name: Normalize repo name
        id: repo
        run: |
          name=$(echo "${{ env.REPO_NAME }}" \
                  | tr '[:upper:]' '[:lower:]' \
                  | sed 's/[^a-z0-9-]//g' \
                  | cut -c1-40)

          if [ ${#name} -lt 3 ]; then
            echo "::error::Nama repo terlalu pendek setelah dinormalisasi: '$name'"
            exit 1
          fi

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "✓ Repo name: $name"

      # ─────────────────────────────────────────────────────────────
      # BUILD FRONTEND DI RUNNER (offload dari STB)
      # ─────────────────────────────────────────────────────────────
      # Alasan: STB shared dengan web lain, npm build berat (RAM/CPU).
      # GitHub runner gratis, 4-core, 16GB RAM → build 30-60 detik.
      # Hasil build dikirim ke STB sebagai folder `dist/` atau `build/`,
      # STB tidak akan jalankan npm sama sekali.
      # ─────────────────────────────────────────────────────────────

      - name: Detect Node version & package manager
        id: nodemeta
        run: |
          set -e
          cd frontend

          # Deteksi package manager dari lockfile
          if [ -f "pnpm-lock.yaml" ]; then
            pm="pnpm"
            install_cmd="pnpm install --frozen-lockfile"
            build_cmd="pnpm run build"
            cache_path="$HOME/.local/share/pnpm/store"
          elif [ -f "yarn.lock" ]; then
            pm="yarn"
            install_cmd="yarn install --frozen-lockfile"
            build_cmd="yarn build"
            cache_path="$HOME/.cache/yarn"
          else
            pm="npm"
            install_cmd="npm ci"
            build_cmd="npm run build"
            cache_path="$HOME/.npm"
          fi

          # Deteksi Node version dari package.json engines, fallback ke 20
          node_ver=$(node -e "
            try {
              const p = require('./package.json');
              const v = p.engines && p.engines.node;
              if (v) console.log(v.replace(/[^0-9.]/g,'').split('.')[0] || '20');
              else console.log('20');
            } catch(e) { console.log('20'); }
          " 2>/dev/null || echo "20")
          # Sanitize: cuma angka
          node_ver=$(echo "$node_ver" | grep -oE '^[0-9]+' | head -1)
          [ -z "$node_ver" ] && node_ver="20"

          echo "pm=$pm"                   >> "$GITHUB_OUTPUT"
          echo "install_cmd=$install_cmd" >> "$GITHUB_OUTPUT"
          echo "build_cmd=$build_cmd"     >> "$GITHUB_OUTPUT"
          echo "node_ver=$node_ver"       >> "$GITHUB_OUTPUT"

          echo "✓ Package manager : $pm"
          echo "✓ Node version    : $node_ver"
          echo "✓ Install command : $install_cmd"
          echo "✓ Build command   : $build_cmd"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nodemeta.outputs.node_ver }}
          # Cache npm/yarn/pnpm dependencies otomatis
          cache: ${{ steps.nodemeta.outputs.pm }}
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/yarn.lock
            frontend/pnpm-lock.yaml

      - name: Install pnpm (kalau perlu)
        if: steps.nodemeta.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          set -e
          echo "::group::Install dependencies"
          ${{ steps.nodemeta.outputs.install_cmd }}
          echo "::endgroup::"

      - name: Build frontend
        working-directory: frontend
        env:
          NODE_ENV: production
          # Env var dari secrets bisa dipakai di build (mis. VITE_API_URL)
          # User bisa add VITE_*/REACT_APP_* di repo secrets, akan auto-injected
          # ke build process. Lihat env block step ini.
        run: |
          set -e
          echo "::group::Build production"
          ${{ steps.nodemeta.outputs.build_cmd }}
          echo "::endgroup::"

          # Verifikasi output build ada
          if [ -d "dist" ]; then
            outdir="dist"
          elif [ -d "build" ]; then
            outdir="build"
          else
            echo "::error::Build selesai tapi folder dist/ atau build/ tidak ada"
            echo "Cek script 'build' di package.json"
            ls -la
            exit 1
          fi

          file_count=$(find "$outdir" -type f | wc -l)
          size=$(du -sh "$outdir" | cut -f1)

          if [ "$file_count" -lt 2 ]; then
            echo "::error::Folder $outdir kosong atau cuma 1 file — build gagal?"
            exit 1
          fi

          # Pastikan index.html ada (sanity check untuk React SPA)
          if [ ! -f "$outdir/index.html" ]; then
            echo "::warning::index.html tidak ditemukan di $outdir/ — pastikan ini build React"
          fi

          echo "✓ Build berhasil: $outdir/ ($file_count file, $size)"

      # ── Bangun ZIP (kirim source backend + build frontend) ────────
      - name: Build deploy package
        id: pkg
        run: |
          set -e
          repo="${{ steps.repo.outputs.name }}"
          zipfile="/tmp/${repo}-deploy.zip"

          echo "::group::Membangun ZIP"

          # Strategi ZIP (mode prebuilt_fe):
          # - frontend/ → CUMA folder dist/build + package.json (untuk metadata)
          #   Source code React (src/, public/) TIDAK dikirim, karena sudah di-build.
          # - backend/ → seluruh source Python (pip install masih di STB)
          # Hasilnya: ZIP jauh lebih kecil + STB tidak punya akses ke source code FE.

          # Deteksi folder build (dist atau build) hasil step sebelumnya
          if [ -d "frontend/dist" ]; then
            fe_build="frontend/dist"
          elif [ -d "frontend/build" ]; then
            fe_build="frontend/build"
          else
            echo "::error::Folder build frontend tidak ada — step build gagal?"
            exit 1
          fi
          echo "Frontend build dir: $fe_build"

          zip -r "$zipfile" "$fe_build" frontend/package.json backend \
            -x "backend/venv/*" \
            -x "backend/venv/**" \
            -x "backend/.venv/*" \
            -x "backend/.venv/**" \
            -x "backend/__pycache__/*" \
            -x "backend/**/__pycache__/*" \
            -x "backend/**/__pycache__/**" \
            -x "backend/*.pyc" \
            -x "backend/**/*.pyc" \
            -x "backend/.pytest_cache/*" \
            -x "backend/.mypy_cache/*" \
            -x "backend/htmlcov/*" \
            -x "backend/.env" \
            -x "backend/.env.local" \
            -x "**/.DS_Store" \
            -x "**/.git/*" \
            -x "**/.gitignore" \
            > /dev/null

          size=$(du -h "$zipfile" | cut -f1)
          size_bytes=$(stat -c%s "$zipfile")

          echo "✓ ZIP siap: $zipfile ($size)"
          echo "  File count: $(unzip -l "$zipfile" | tail -1 | awk '{print $2}')"

          # Hard limit 512 MB (sesuai script PHP)
          if [ "$size_bytes" -gt 536870912 ]; then
            echo "::error::ZIP terlalu besar ($size). Limit DeployCC = 512 MB."
            exit 1
          fi

          echo "::endgroup::"

          echo "path=$zipfile" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"

      # ── Kirim ke endpoint DeployCC ────────────────────────────────
      - name: Deploy to DeployCC
        id: deploy
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_API_KEY }}
        run: |
          set -e
          repo="${{ steps.repo.outputs.name }}"
          zipfile="${{ steps.pkg.outputs.path }}"
          skip_fe="${{ steps.flags.outputs.skip_fe_build }}"
          skip_be="${{ steps.flags.outputs.skip_be_install }}"

          # Fallback ke 'deploycc-classroom' kalau secret tidak diset
          # (mode classroom hanya jalan dari GitHub Actions, sesuai script PHP)
          if [ -z "$DEPLOY_KEY" ]; then
            echo "::warning::DEPLOY_API_KEY tidak diset → pakai mode classroom"
            DEPLOY_KEY="deploycc-classroom"
          fi

          echo "::group::Kirim ke ${{ env.DEPLOY_ENDPOINT }}"
          echo "  repo            : $repo"
          echo "  zip size        : ${{ steps.pkg.outputs.size }}"
          echo "  prebuilt_fe     : 1 (frontend sudah di-build di runner)"
          echo "  skip_fe_build   : $skip_fe"
          echo "  skip_be_install : $skip_be"
          echo "::endgroup::"

          response_file="/tmp/deploy-response.txt"
          # Catatan teknis:
          # --http1.1            → wajib, hindari HTTP/2 INTERNAL_ERROR dari Cloudflare
          #                        (streaming response PHP dengan flush() rentan
          #                         ke-cut di HTTP/2 framing layer)
          # --retry-all-errors   → retry untuk SEMUA error, bukan cuma HTTP 5xx
          # --no-keepalive       → connection fresh tiap retry
          # --expect100-timeout  → kurangi delay handshake untuk multipart
          http_code=$(curl -sS \
            --http1.1 \
            --no-keepalive \
            --max-time 1200 \
            --connect-timeout 30 \
            --expect100-timeout 5 \
            --retry 3 \
            --retry-delay 15 \
            --retry-all-errors \
            --retry-connrefused \
            -o "$response_file" \
            -w "%{http_code}" \
            -X POST "${{ env.DEPLOY_ENDPOINT }}" \
            -F "key=$DEPLOY_KEY" \
            -F "repo=$repo" \
            -F "mode=full" \
            -F "prebuilt_fe=1" \
            -F "skip_fe_build=$skip_fe" \
            -F "skip_be_install=$skip_be" \
            -F "file=@$zipfile" \
            -A "GitHub-Actions-DeployCC" \
            -H "Expect:")

          echo "::group::Response dari DeployCC (HTTP $http_code)"
          cat "$response_file"
          echo ""
          echo "::endgroup::"

          # Cek error
          if [ "$http_code" != "200" ]; then
            echo "::error::Deploy gagal dengan HTTP $http_code"
            exit 1
          fi

          if grep -q "DEPLOYCC_ERROR" "$response_file"; then
            echo "::error::DeployCC mengembalikan error — lihat response di atas"
            exit 1
          fi

          if ! grep -q "DEPLOYCC_START" "$response_file"; then
            echo "::error::Response tidak valid (tidak ada marker DEPLOYCC_START)"
            exit 1
          fi

          # Extract info penting untuk summary
          domain=$(grep "^ADPL:domain=" "$response_file" | cut -d= -f2- | head -1)
          backend_live=$(grep "^ADPL:backend_live=" "$response_file" | cut -d= -f2- | head -1)
          srv_status=$(grep "^ADPL:srv_status=" "$response_file" | cut -d= -f2- | head -1)
          infra_rebuilt=$(grep "^ADPL:infra_rebuilt=" "$response_file" | cut -d= -f2- | head -1)
          port=$(grep "^ADPL:port=" "$response_file" | awk -F'[= ]' '{print $2}' | head -1)

          echo "domain=$domain" >> "$GITHUB_OUTPUT"
          echo "backend_live=$backend_live" >> "$GITHUB_OUTPUT"
          echo "srv_status=$srv_status" >> "$GITHUB_OUTPUT"
          echo "infra_rebuilt=$infra_rebuilt" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      # ── Summary di GitHub Actions UI ──────────────────────────────
      - name: Write deploy summary
        if: always() && steps.deploy.outcome == 'success'
        run: |
          {
            echo ""
            echo "## ✅ Deploy Berhasil"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| 🌐 URL | ${{ steps.deploy.outputs.domain }} |"
            echo "| 🐍 Backend live | ${{ steps.deploy.outputs.backend_live }} |"
            echo "| ⚙️ Service status | \`${{ steps.deploy.outputs.srv_status }}\` |"
            echo "| 🔌 Uvicorn port | ${{ steps.deploy.outputs.port }} |"
            echo "| 🏗 Infra rebuilt | ${{ steps.deploy.outputs.infra_rebuilt }} |"
            echo "| 📦 ZIP size | ${{ steps.pkg.outputs.size }} |"
            echo ""

            if [ "${{ steps.deploy.outputs.backend_live }}" != "YES" ]; then
              echo "### ⚠️ Backend belum live"
              echo ""
              echo "Kalau ini deploy pertama, kamu perlu setup \`.env\` & database PostgreSQL via SSH."
              echo "Detail langkah ada di log job ini (cari section **LANGKAH SETUP WAJIB**)."
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: rm -f /tmp/*-deploy.zip /tmp/deploy-response.txt || true
