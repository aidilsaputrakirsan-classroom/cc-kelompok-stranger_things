version: "3.9"

services:
  # ==================== AUTH DATABASE ====================
  auth-db:
    image: postgres:16-alpine
    container_name: bye_virus-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bye_virus
    ports:
      - "5432:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bye_virus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== ITEM DATABASE ====================
  item-db:
    image: postgres:16-alpine
    container_name: bye_virus-item-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bye_virus
    ports:
      - "5433:5432"
    volumes:
      - item_pgdata:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bye_virus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== AUTH SERVICE ====================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    image: bye_virus-auth-service
    container_name: bye_virus-auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@auth-db:5432/bye_virus"
    ports:
      - "8001:8001"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - cloudnet
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== ITEM SERVICE ====================
  item-service:
    build:
      context: ./services/item-service
      dockerfile: Dockerfile
    image: bye_virus-item-service
    container_name: bye_virus-item-service
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@item-db:5432/bye_virus"
    ports:
      - "8002:8002"
    depends_on:
      item-db:
        condition: service_healthy
    networks:
      - cloudnet
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost
    image: bye_virus-frontend
    container_name: bye_virus-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - item-service
    networks:
      - cloudnet

  # ==================== GATEWAY (NGINX) ====================
  gateway:
    image: nginx:alpine
    container_name: bye_virus-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - item-service
      - frontend
    networks:
      - cloudnet

# ==================== VOLUMES ====================
volumes:
  auth_pgdata:
  item_pgdata:

# ==================== NETWORKS ====================
networks:
  cloudnet:
    driver: bridge
